<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>도로 스냅(Map Matching) 보정 시뮬레이션</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #map { width: 100%; height: 100vh; }
        #overlay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: center;
            width: 85%;
            max-width: 400px;
        }
        h2 { margin: 0 0 10px 0; font-size: 18px; color: #1e293b; }
        p { margin: 0 0 15px 0; font-size: 13px; color: #475569; line-height: 1.4; }
        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 2px 4px rgba(37, 99, 235, 0.3);
            transition: all 0.2s;
        }
        button:active { transform: scale(0.98); background: #1d4ed8; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .badge-gray { background: #cbd5e1; color: #475569; }
        .badge-red { background: #fee2e2; color: #e11d48; }
    </style>
</head>
<body>
    <div id="overlay">
        <h2>✨ AI 도로 스냅 시뮬레이션</h2>
        <p>
            지도 위의 <span class="badge badge-gray">회색 선</span>은 작업자가 골목길을 <b>여러 번 왔다 갔다 하며 겹치게 그어버린 원본(GPS 흔적)</b>입니다.<br><br>
            아래 [AI 자동 보정] 버튼을 누르면 인공지능이 겹친 선들을 분석하여 <span class="badge badge-red">단 한 줄의 도로 중앙선</span>으로 예쁘게 펴줍니다! (통신망 에러 없는 오프라인 데모)
        </p>
        <button id="snapBtn" onclick="runMapMatching()">🚀 인공지능 도로 스냅(자동 보정) 실행!</button>
    </div>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([37.615246, 126.715632], 17);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);

        const messyCoords = [
            [126.715000, 37.615000], [126.715200, 37.615100], [126.715500, 37.615250],
            [126.715700, 37.615350], [126.715550, 37.615280], [126.715800, 37.615400],
            [126.715600, 37.615300], [126.715300, 37.615150], [126.715100, 37.615050]
        ];
        const latLngs = messyCoords.map(c => [c[1], c[0]]);

        const originalPath = L.polyline(latLngs, { color: '#64748b', weight: 6, opacity: 0.6, dashArray: '10, 10' }).addTo(map);
        
        const bounds = originalPath.getBounds();
        setTimeout(() => {
            map.invalidateSize();
            const targetPoint = map.project(bounds.getCenter(), 18);
            targetPoint.y -= 100;
            map.flyTo(map.unproject(targetPoint, 18), 18, { animate: true });
        }, 500);

        function runMapMatching() {
            const btn = document.getElementById('snapBtn');
            btn.disabled = true;
            btn.innerText = "분석 완료! 매끄러운 단일 선으로 변환되었습니다.";

            // 하드코딩된 완벽한 분석 결과 (무료 외부 통신망의 불안정성 에러 원천 차단)
            const matchedCoords = [
                [126.715179,37.615237],[126.715127,37.615308],[126.715371,37.615637],
                [126.715459,37.615599],[126.715765,37.615453],[126.715872,37.615402],
                [126.715801,37.615308],[126.715967,37.615228],[126.716002,37.61526],
                [126.715763,37.614959],[126.715453,37.615106],[126.715316,37.615172],[126.715225,37.615215]
            ];
            
            const matchedLatLngs = matchedCoords.map(c => [c[1], c[0]]);

            L.polyline(matchedLatLngs, { color: '#e11d48', weight: 8, opacity: 1 }).addTo(map);
            originalPath.setStyle({ opacity: 0.2 });
        }
    </script>
</body>
</html>
