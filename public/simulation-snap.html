<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>도로 스냅(Map Matching) 보정 시뮬레이션</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #map { width: 100%; height: 100vh; }
        #overlay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: center;
            width: 85%;
            max-width: 400px;
        }
        h2 { margin: 0 0 10px 0; font-size: 18px; color: #1e293b; }
        p { margin: 0 0 15px 0; font-size: 13px; color: #475569; line-height: 1.4; }
        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 2px 4px rgba(37, 99, 235, 0.3);
            transition: all 0.2s;
        }
        button:active { transform: scale(0.98); background: #1d4ed8; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        .highlight { color: #e11d48; font-weight: bold; }
        .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .badge-gray { background: #cbd5e1; color: #475569; }
        .badge-red { background: #fee2e2; color: #e11d48; }
    </style>
</head>
<body>

    <div id="overlay">
        <h2>✨ AI 도로 스냅 시뮬레이션</h2>
        <p>
            지도 위의 <span class="badge badge-gray">회색 선</span>은 작업자가 골목길을 <b>여러 번 왔다 갔다 하며 겹치게 그어버린 원본(GPS 흔적)</b>입니다.<br><br>
            아래 [AI 자동 보정] 버튼을 누르면 실시간으로 도로망 시스템이 겹친 선들을 분석하여 <span class="badge badge-red">단 한 줄의 붉은색 도로 중앙선</span>으로 예쁘게 펴줍니다!
        </p>
        <button id="snapBtn" onclick="runMapMatching()">🚀 인공지능 도로 스냅(자동 보정) 실행!</button>
    </div>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // 1. 지도 초기화 (김포 시청 부근)
        const map = L.map('map').setView([37.615246, 126.715632], 17);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // 2. 가상의 지저분한 '왕복' GPS 경로 (같은 골목길 위를 왔다갔다하며 겹치고 떨림)
        // OSRM Map Matching 서버는 경도,위도([Lng, Lat]) 배열을 요구합니다.
                const messyCoords = [
            [126.7169929, 37.6196513],
            [126.716621, 37.6198615],
            [126.7162647, 37.6197318],
            [126.716008, 37.6194526],
            [126.7156633, 37.6190141],
            [126.7154578, 37.6186947],
            [126.715796, 37.619102],
            [126.7161496, 37.6194883],
            [126.716348, 37.619877],
            [126.7160855, 37.6202264],
            [126.7155507, 37.6204876],
            [126.715567, 37.6204539],
            [126.7160686, 37.6201904],
            [126.7163514, 37.6201625],
            [126.7158578, 37.6204523],
            [126.7154894, 37.6206269],
            [126.7159438, 37.6203293],
            [126.7164648, 37.6200679],

            [126.7156554, 37.6209412],
            [126.7158367, 37.6212745],
            [126.71616, 37.6216026],
            [126.7161873, 37.6215319],
            [126.7156292, 37.6217714],
            [126.7150776, 37.6218636],
            [126.7155603, 37.6217404],
            [126.7161229, 37.6216041],
            [126.7166536, 37.6213625],
            [126.7169508, 37.621199],
            [126.7173045, 37.6210232],
            [126.7170672, 37.6207432],
            [126.7167172, 37.6203039],
            [126.7161736, 37.6205018],
            [126.7158843, 37.6206524],
            [126.7164064, 37.6203542],
            [126.7165487, 37.6200269],
            [126.7169844, 37.6196571],
            [126.7173204, 37.6194076],
            [126.7171377, 37.6190675],
            [126.7173938, 37.6193878],
            [126.7176332, 37.6191795],
            [126.718166, 37.6188913],
            [126.7181754, 37.6185422],
            [126.7179093, 37.6181443],
            [126.7176257, 37.6177877],
            [126.717289, 37.6173823],

            [126.7167183, 37.618288],
            [126.7168804, 37.617911],
            [126.7163562, 37.6181516],
            [126.7163971, 37.6181182],
            [126.7162259, 37.6178092],
            [126.7159416, 37.6174129],
            [126.7156407, 37.6170724],
            [126.7153998, 37.6172528],
            [126.7156586, 37.6176326],
            [126.7159794, 37.6179842],
            [126.7159385, 37.618372],
            [126.7155463, 37.6181526],
            [126.7152364, 37.6177605],
            [126.7148404, 37.617349],
            [126.714657, 37.617638],
            [126.7149083, 37.61804],
            [126.7152154, 37.6184553],
            [126.7156626, 37.6184619],
            [126.7160457, 37.618772],
            [126.7163387, 37.6191613],
            [126.7167789, 37.6190499],
            [126.7165169, 37.6186656],
            [126.7162379, 37.6182669],
            [126.7161911, 37.6182387]
        ];

        // Leaflet 에 그리기 위해 [Lat, Lng] 로 반전
        const latLngs = messyCoords.map(c => [c[1], c[0]]);

        // 지저분한 원본 폴리라인 (회색, 점선 느낌)
        const originalPath = L.polyline(latLngs, {
            color: '#64748b',
            weight: 6,
            opacity: 0.6,
            dashArray: '10, 10'
        }).addTo(map);

        // 지도를 선 위치와 오버레이(배너) 간격을 고려해 센터링
        const bounds = originalPath.getBounds();
        const center = bounds.getCenter();
        
        setTimeout(() => {
            map.invalidateSize();
            const targetPoint = map.project(center, 18);
            targetPoint.y -= 100; // 하단으로 밀기
            map.flyTo(map.unproject(targetPoint, 18), 18, { animate: true });
        }, 500);

        let snappedPath = null;

        // 3. OSRM Map Matching API 호출 함수
        async function runMapMatching() {
            const btn = document.getElementById('snapBtn');
            btn.disabled = true;
            btn.innerText = "분석 및 보정 중... ⏳";

            try {
                // OSRM 호환 좌표 스트링 파싱 (lon,lat;lon,lat...)
                const coordinatesString = messyCoords.map(c => `${c[0]},${c[1]}`).join(';');
                // radiuses 파라미터 : 각 점마다 반경 20m 이내 도로 탐색 허용
                const radiusesString = messyCoords.map(() => '20').join(';');

                // OSRM 공용 데모 서버 호출 (보행자 foot 모드 데이터 사용)
                // 실제 도입 시엔 Mapbox나 Kakao 모빌리티 보정 API를 사용할 수 있습니다.
                const url = `https://router.project-osrm.org/match/v1/foot/${coordinatesString}?geometries=geojson&radiuses=${radiusesString}`;
                
                const response = await fetch(url);
                const data = await response.json();

                if (data.code !== 'Ok' || !data.matchings || data.matchings.length === 0) {
                    alert("근처에 달라붙을 만한 적절한 도로(보도) 코드를 찾지 못했습니다.");
                    btn.disabled = false;
                    btn.innerText = "🚀 다시 시도하기";
                    return;
                }

                // 매칭된 정확한 도로 중앙선 데이터 추출
                const matchedGeometry = data.matchings[0].geometry.coordinates;
                const matchedLatLngs = matchedGeometry.map(c => [c[1], c[0]]);

                // 기존 스냅 선이 있으면 삭제
                if (snappedPath) {
                    map.removeLayer(snappedPath);
                }

                // 얇고 예리한 깨끗한 선을 지도 위에 새로 그리기
                snappedPath = L.polyline(matchedLatLngs, {
                    color: '#e11d48',
                    weight: 8,
                    opacity: 1
                }).addTo(map);

                // 시각적 강조를 위해 회색선 흐리게 처리
                originalPath.setStyle({ opacity: 0.2 });

                btn.innerText = "✅ 보정 완료! 놀라운 결과를 확인하세요.";

            } catch (error) {
                console.error(error);
                alert("서버 연결에 실패했습니다.");
                btn.disabled = false;
                btn.innerText = "🚀 인공지능 도로 스냅(자동 보정) 실행!";
            }
        }
    </script>
</body>
</html>
