name: Build Android APK

on:
  workflow_dispatch: # 수동으로 언제든 빌드 버튼을 누를 수 있게 함
  push:
    branches:
      - main # 메인 브랜치에 코드가 올라갈때마다 자동 빌드

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Build Next.js (Export)
        run: |
          # Vercel 환경에서는 정상 동작하지만 빈 out 폴더가 필요할 수 있으므로 생성
          mkdir -p out
          echo "<html><head><meta http-equiv=\"refresh\" content=\"0;url=https://clean-track-leesookils-projects.vercel.app\"></head><body>Loading...</body></html>" > out/index.html
        
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Capacitor Sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x android/gradlew
          if ! npx cap sync android > sync_log.txt 2>&1; then
            cat sync_log.txt
            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'
            git add sync_log.txt
            git commit -m "chore: push sync_log.txt for debugging"
            git push origin HEAD:main || true
            exit 1
          fi
      - name: Build APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CleanTrack-App-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
